<!--
  OG IMAGE GENERATOR

  To create og-image.png:
  1. Open this file in Chrome browser
  2. Press F12 to open DevTools
  3. Click device toggle icon (top left of DevTools toolbar)
  4. Set custom size: Width 1200, Height 630
  5. Click the 3-dots menu in DevTools (top right)
  6. Click "Capture full size screenshot"
  7. Rename the downloaded file to: og-image.png
  8. Move to: public/og-image.png
  9. Push to GitHub and redeploy
-->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap');

  body {
    width: 1200px;
    height: 630px;
    background: #042C53;
    font-family: 'Montserrat', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .container {
    width: 100%;
    height: 100%;
    padding: 60px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
  }

  /* Subtle background pattern */
  .bg-pattern {
    position: absolute;
    top: 0;
    right: 0;
    width: 400px;
    height: 630px;
    opacity: 0.04;
    background: repeating-linear-gradient(
      45deg,
      #ffffff,
      #ffffff 1px,
      transparent 1px,
      transparent 20px
    );
  }

  /* Top section — logo + company */
  .top {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 48px;
  }

  .hex-logo {
    width: 72px;
    height: 72px;
    flex-shrink: 0;
  }

  .company-info .name {
    font-size: 22px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: 3px;
    line-height: 1;
  }

  .company-info .sub {
    font-size: 11px;
    color: #B5D4F4;
    letter-spacing: 2px;
    margin-top: 5px;
  }

  .company-info .tagline {
    font-size: 12px;
    font-style: italic;
    color: #EF9F27;
    margin-top: 4px;
  }

  /* Middle — main headline */
  .headline {
    font-size: 52px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.15;
    margin-bottom: 16px;
    max-width: 700px;
  }

  .headline em {
    color: #EF9F27;
    font-style: italic;
  }

  /* Sub text */
  .subtext {
    font-size: 18px;
    color: #B5D4F4;
    font-weight: 400;
    line-height: 1.5;
    max-width: 600px;
    margin-bottom: 40px;
  }

  /* Bottom — product pills */
  .products {
    display: flex;
    gap: 12px;
  }

  .pill {
    padding: 8px 20px;
    border-radius: 40px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .pill-blue {
    background: #185FA5;
    color: #E6F1FB;
    border: 1px solid #378ADD;
  }

  .pill-gold {
    background: transparent;
    color: #EF9F27;
    border: 1px solid #EF9F27;
  }

  /* Right side decoration */
  .right-decoration {
    position: absolute;
    right: 80px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.15;
  }

  /* Bottom URL */
  .url {
    position: absolute;
    bottom: 40px;
    right: 80px;
    font-size: 14px;
    color: #B5D4F4;
    letter-spacing: 1px;
    font-weight: 500;
  }

  /* Left accent bar */
  .accent-bar {
    position: absolute;
    left: 0;
    top: 0;
    width: 6px;
    height: 100%;
    background: #EF9F27;
  }
</style>
</head>
<body>
<div class="container">

  <div class="accent-bar"></div>
  <div class="bg-pattern"></div>

  <!-- Logo + Company -->
  <div class="top">
    <svg class="hex-logo" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
      <polygon points="36,4 64,20 64,52 36,68 8,52 8,20" fill="#185FA5"/>
      <path d="M36,14 C48,26 54,38 54,46 C54,56 46,62 36,62 C26,62 18,56 18,46 C18,38 24,26 36,14 Z" fill="#E6F1FB"/>
      <polygon points="39,20 30,44 36,44 31,58 44,38 38,38 44,20" fill="#EF9F27"/>
    </svg>
    <div class="company-info">
      <div class="name">AQULEO TECHNOLOGIES</div>
      <div class="sub">ANDHRA PRADESH, INDIA</div>
      <div class="tagline">Built in India. Built for the World.</div>
    </div>
  </div>

  <!-- Main headline -->
  <div class="headline">
    We build software<br/>that <em>works.</em>
  </div>

  <!-- Sub text -->
  <div class="subtext">
    Products for everyday users.
    Solutions for growing businesses.
  </div>

  <!-- Product pills -->
  <div class="products">
    <span class="pill pill-blue">Lekka — లెక్క</span>
    <span class="pill pill-blue">PaisaaLens</span>
    <span class="pill pill-gold">IT Services</span>
  </div>

  <!-- Right decoration -->
  <div class="right-decoration">
    <svg width="300" height="300" viewBox="0 0 300 300">
      <polygon points="150,10 270,80 270,220 150,290 30,220 30,80" fill="none" stroke="#FFFFFF" stroke-width="2"/>
      <polygon points="150,40 240,95 240,205 150,260 60,205 60,95" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    </svg>
  </div>

  <!-- Website URL -->
  <div class="url">aquleo.in</div>

</div>
</body>
</html>
